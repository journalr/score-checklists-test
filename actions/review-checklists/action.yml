name: "Review Checklists"
description: >
  Manages review checklists on pull requests.  Posts checklist comments,
  tracks reviewer acknowledgements, dismisses stale approvals, and records
  evidence on merge.

inputs:
  action:
    description: >
      Which action to run.  One of:
        post            – Post/update checklist comments
        check           – Verify acknowledgements and set status
        check_strict    – Verify acknowledgements; fail if incomplete
        dismiss_sync    – Invalidate OKs after new push
        dismiss_edit    – Dismiss approval after OK edit/delete
        evidence        – Create merge evidence commit
        evidence_strict – Verify acknowledgements then create evidence; fail if incomplete
    required: true
  github-token:
    description: "GitHub token with repo permissions"
    required: true
  pr-number:
    description: "Pull request number"
    required: true
  before-sha:
    description: "SHA before the push (for synchronize events)"
    required: false
    default: ""
  after-sha:
    description: "SHA after the push (for synchronize events)"
    required: false
    default: ""
  branch:
    description: >
      Git ref to commit evidence on (e.g. 'heads/main' or
      'heads/gh-readonly-queue/main/pr-42-abc123').
      Only used by the evidence and evidence_strict actions.
      Defaults to heads/{pr.base.ref} when empty.
    required: false
    default: ""
  head-sha:
    description: >
      The commit SHA to set the commit status on.  When running inside a
      merge_group event this should be github.event.merge_group.head_sha.
      If empty, falls back to the PR head SHA.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Run post_checklists
      if: inputs.action == 'post'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
      run: bazel run //actions/review-checklists/scripts:post_checklists

    - name: Run check_acknowledgements
      if: inputs.action == 'check'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
      run: bazel run //actions/review-checklists/scripts:check_acknowledgements

    - name: Run check_acknowledgements (strict)
      if: inputs.action == 'check_strict'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
      run: bazel run //actions/review-checklists/scripts:check_acknowledgements -- --strict

    - name: Run dismiss_and_invalidate (synchronize)
      if: inputs.action == 'dismiss_sync'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        BEFORE_SHA: ${{ inputs.before-sha }}
        AFTER_SHA: ${{ inputs.after-sha }}
      run: bazel run //actions/review-checklists/scripts:dismiss_and_invalidate -- --trigger synchronize

    - name: Run dismiss_and_invalidate (comment changed)
      if: inputs.action == 'dismiss_edit'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
      run: bazel run //actions/review-checklists/scripts:dismiss_and_invalidate -- --trigger comment_changed

    - name: Run merge_evidence_commit
      if: inputs.action == 'evidence'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        EVIDENCE_BRANCH: ${{ inputs.branch }}
      run: |
        ARGS=""
        if [ -n "$EVIDENCE_BRANCH" ]; then
          ARGS="-- --branch $EVIDENCE_BRANCH"
        fi
        bazel run //actions/review-checklists/scripts:merge_evidence_commit $ARGS

    - name: Run merge_evidence_commit (strict)
      if: inputs.action == 'evidence_strict'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        EVIDENCE_BRANCH: ${{ inputs.branch }}
        HEAD_SHA: ${{ inputs.head-sha }}
      run: |
        ARGS="-- --strict"
        if [ -n "$EVIDENCE_BRANCH" ]; then
          ARGS="$ARGS --branch $EVIDENCE_BRANCH"
        fi
        bazel run //actions/review-checklists/scripts:merge_evidence_commit $ARGS
