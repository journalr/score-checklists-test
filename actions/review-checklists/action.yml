name: "Review Checklists"
description: >
  Manages review checklists on pull requests.  Posts checklist comments,
  tracks reviewer acknowledgements, dismisses stale approvals, and
  maintains evidence in the PR description and merge-queue evidence notices.

inputs:
  action:
    description: >
      Which action to run.  One of:
        post            – Post/update checklist comments and evidence
        check           – Verify acknowledgements; fail if incomplete
        dismiss_sync    – Invalidate OKs after new push
        dismiss_edit    – Dismiss approval after OK edit/delete
    required: true
  github-token:
    description: "GitHub token with repo permissions"
    required: true
  pr-number:
    description: "Pull request number"
    required: false
    default: ""
  before-sha:
    description: "SHA before the push (for synchronize events)"
    required: false
    default: ""
  after-sha:
    description: "SHA after the push (for synchronize events)"
    required: false
    default: ""
  head-sha:
    description: >
      Commit SHA to set the status on (used for merge_group events).
    required: false
    default: ""
  config-path:
    description: >
      Relative path to the checklist configuration file.
      Defaults to '.github/review-checklists.yml'.
    required: false
    default: ".github/review-checklists.yml"

runs:
  using: composite
  steps:
    - name: Install review-checklists requirements
      shell: bash
      run: python3 -m pip install -r "$GITHUB_ACTION_PATH/requirements.txt"

    - name: Run post_checklists
      if: inputs.action == 'post'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
      run: python3 "$GITHUB_ACTION_PATH/scripts/post_checklists.py" --config-path "${{ inputs.config-path }}"

    - name: Run check_acknowledgements
      if: inputs.action == 'check'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        HEAD_SHA: ${{ inputs.head-sha }}
      run: python3 "$GITHUB_ACTION_PATH/scripts/check_acknowledgements.py" --config-path "${{ inputs.config-path }}"


    - name: Run dismiss_and_invalidate (synchronize)
      if: inputs.action == 'dismiss_sync'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        BEFORE_SHA: ${{ inputs.before-sha }}
        AFTER_SHA: ${{ inputs.after-sha }}
      run: python3 "$GITHUB_ACTION_PATH/scripts/dismiss_and_invalidate.py" --trigger synchronize --config-path "${{ inputs.config-path }}"

    - name: Run dismiss_and_invalidate (comment changed)
      if: inputs.action == 'dismiss_edit'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ inputs.pr-number }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
      run: python3 "$GITHUB_ACTION_PATH/scripts/dismiss_and_invalidate.py" --trigger comment_changed --config-path "${{ inputs.config-path }}"
