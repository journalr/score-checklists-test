name: "Rebase on Dependency PR"
description: "Rebases the current PR onto another PR specified via 'Depends-On: #<PR_NUMBER>' in the PR description"

branding:
  icon: git-merge
  color: gray-dark

inputs:
  token:
    description: "GitHub token with permissions to read PR information"
    required: false
    default: ${{ github.token }}

outputs:
  dependency_prs:
    description: "Comma-separated list of PR numbers that this PR depends on (if found)"
    value: ${{ steps.find-dependency.outputs.dependency_prs }}
  dependency_count:
    description: "Number of dependency PRs found"
    value: ${{ steps.find-dependency.outputs.dependency_count }}
  rebased:
    description: "Whether a rebase was performed"
    value: ${{ steps.rebase.outputs.rebased }}
  rebased_count:
    description: "Number of PRs successfully rebased onto"
    value: ${{ steps.rebase.outputs.rebased_count }}

runs:
  using: composite
  steps:
    - name: Find dependency PR from description
      id: find-dependency
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
      run: |
        # Only run for pull request events
        if [[ "${{ github.event_name }}" != "pull_request" && "${{ github.event_name }}" != "merge_group" ]]; then
          echo "Not a pull request event, skipping dependency check"
          echo "dependency_prs=" >> $GITHUB_OUTPUT
          echo "dependency_count=0" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Get PR number from context
        PR_NUMBER="${{ github.event.pull_request.number }}"

        if [[ -z "$PR_NUMBER" ]]; then
          echo "Could not determine PR number"
          echo "dependency_prs=" >> $GITHUB_OUTPUT
          echo "dependency_count=0" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "Checking PR #${PR_NUMBER} for dependencies..."

        # Fetch PR description using GitHub CLI
        PR_BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body' 2>/dev/null || echo "")

        if [[ -z "$PR_BODY" ]]; then
          echo "Could not fetch PR description or description is empty"
          echo "dependency_prs=" >> $GITHUB_OUTPUT
          echo "dependency_count=0" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Look for all "Depends-On:" patterns in the PR description
        # Supports formats: "Depends-On: #123", "Depends-On: 123", "Depends-On:#123"
        DEPENDENCY_PRS=$(echo "$PR_BODY" | grep -ioE 'Depends-On:[[:space:]]*#?[0-9]+' | grep -oE '[0-9]+' | tr '\n' ',' | sed 's/,$//' || echo "")

        if [[ -z "$DEPENDENCY_PRS" ]]; then
          echo "No 'Depends-On:' keyword found in PR description"
          echo "dependency_prs=" >> $GITHUB_OUTPUT
          echo "dependency_count=0" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Count dependencies
        DEPENDENCY_COUNT=$(echo "$DEPENDENCY_PRS" | tr ',' '\n' | wc -l)

        echo "Found ${DEPENDENCY_COUNT} dependency PR(s): ${DEPENDENCY_PRS}"
        echo "dependency_prs=${DEPENDENCY_PRS}" >> $GITHUB_OUTPUT
        echo "dependency_count=${DEPENDENCY_COUNT}" >> $GITHUB_OUTPUT

    - name: Rebase on dependency PR
      id: rebase
      if: steps.find-dependency.outputs.dependency_prs != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        DEPENDENCY_PRS: ${{ steps.find-dependency.outputs.dependency_prs }}
      run: |
        REBASED_COUNT=0
        SKIPPED_PRS=""
        FAILED_PRS=""

        # Configure git user for the rebase
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # Process each dependency PR
        IFS=',' read -ra PR_ARRAY <<< "$DEPENDENCY_PRS"
        for DEPENDENCY_PR in "${PR_ARRAY[@]}"; do
          echo ""
          echo "=========================================="
          echo "Processing dependency PR #${DEPENDENCY_PR}..."
          echo "=========================================="

          # Get the head ref (branch name) of the dependency PR
          DEPENDENCY_BRANCH=$(gh pr view "$DEPENDENCY_PR" --json headRefName --jq '.headRefName' 2>/dev/null || echo "")

          if [[ -z "$DEPENDENCY_BRANCH" ]]; then
            echo "::error::Could not fetch branch name for PR #${DEPENDENCY_PR}. Make sure the PR exists and is open."
            FAILED_PRS="${FAILED_PRS}${DEPENDENCY_PR},"
            continue
          fi

          echo "Dependency PR branch: ${DEPENDENCY_BRANCH}"

          # Check if the dependency PR is still open
          DEPENDENCY_STATE=$(gh pr view "$DEPENDENCY_PR" --json state --jq '.state' 2>/dev/null || echo "")

          if [[ "$DEPENDENCY_STATE" == "MERGED" ]]; then
            echo "Dependency PR #${DEPENDENCY_PR} has been merged. Skipping."
            SKIPPED_PRS="${SKIPPED_PRS}${DEPENDENCY_PR}(merged),"
            continue
          fi

          if [[ "$DEPENDENCY_STATE" == "CLOSED" ]]; then
            echo "::warning::Dependency PR #${DEPENDENCY_PR} is closed but not merged. Consider removing the Depends-On reference."
            SKIPPED_PRS="${SKIPPED_PRS}${DEPENDENCY_PR}(closed),"
            continue
          fi

          # Fetch the dependency branch
          echo "Fetching dependency branch..."
          git fetch origin "${DEPENDENCY_BRANCH}:refs/remotes/origin/${DEPENDENCY_BRANCH}"

          # Perform the rebase
          echo "Rebasing current branch onto origin/${DEPENDENCY_BRANCH}..."
          if git rebase "origin/${DEPENDENCY_BRANCH}"; then
            echo "Rebase onto PR #${DEPENDENCY_PR} successful!"
            REBASED_COUNT=$((REBASED_COUNT + 1))
          else
            echo "::error::Rebase failed for PR #${DEPENDENCY_PR}. There may be conflicts."
            git rebase --abort
            FAILED_PRS="${FAILED_PRS}${DEPENDENCY_PR},"
          fi
        done

        # Set outputs
        if [[ $REBASED_COUNT -gt 0 ]]; then
          echo "rebased=true" >> $GITHUB_OUTPUT
        else
          echo "rebased=false" >> $GITHUB_OUTPUT
        fi
        echo "rebased_count=${REBASED_COUNT}" >> $GITHUB_OUTPUT
        echo "skipped_prs=${SKIPPED_PRS%,}" >> $GITHUB_OUTPUT
        echo "failed_prs=${FAILED_PRS%,}" >> $GITHUB_OUTPUT

        echo ""
        echo "=========================================="
        echo "Summary: Rebased onto ${REBASED_COUNT} PR(s)"
        if [[ -n "$SKIPPED_PRS" ]]; then
          echo "Skipped: ${SKIPPED_PRS%,}"
        fi
        if [[ -n "$FAILED_PRS" ]]; then
          echo "Failed: ${FAILED_PRS%,}"
          exit 1
        fi
        echo "=========================================="

    - name: Summary
      if: always()
      shell: bash
      run: |
        DEPENDENCY_PRS="${{ steps.find-dependency.outputs.dependency_prs }}"
        DEPENDENCY_COUNT="${{ steps.find-dependency.outputs.dependency_count }}"
        REBASED="${{ steps.rebase.outputs.rebased }}"
        REBASED_COUNT="${{ steps.rebase.outputs.rebased_count }}"
        SKIPPED_PRS="${{ steps.rebase.outputs.skipped_prs }}"
        FAILED_PRS="${{ steps.rebase.outputs.failed_prs }}"

        echo "### Dependency Check" >> $GITHUB_STEP_SUMMARY

        if [[ -z "$DEPENDENCY_PRS" ]]; then
          echo "No dependency found in PR description." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To declare dependencies, add \`Depends-On: #<PR_NUMBER>\` to your PR description." >> $GITHUB_STEP_SUMMARY
          echo "You can add multiple \`Depends-On:\` lines for multiple dependencies." >> $GITHUB_STEP_SUMMARY
        else
          echo "Found **${DEPENDENCY_COUNT}** dependency PR(s): ${DEPENDENCY_PRS}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "$REBASED_COUNT" -gt 0 ]]; then
            echo "✅ Successfully rebased onto **${REBASED_COUNT}** PR(s)" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ -n "$SKIPPED_PRS" ]]; then
            echo "ℹ️ Skipped PRs (already merged or closed): ${SKIPPED_PRS}" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ -n "$FAILED_PRS" ]]; then
            echo "❌ Failed to rebase onto PR(s): ${FAILED_PRS}" >> $GITHUB_STEP_SUMMARY
          fi

          if [[ "$REBASED" != "true" && -z "$FAILED_PRS" ]]; then
            echo "ℹ️ No rebase was needed (all dependency PRs are merged or closed)" >> $GITHUB_STEP_SUMMARY
          fi
        fi

