# After a PR is merged, create an empty evidence commit on the target branch
# that records each relevant checklist and who acknowledged it.

name: Review Checklists – Merge Evidence

on:
  pull_request:
    types: [closed]

concurrency:
  group: review-checklists-merge-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read

jobs:
  record-evidence:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Create evidence commit
        uses: ./actions/review-checklists
        with:
          action: evidence
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ github.event.pull_request.number }}

