# Merge-queue gate for review checklists.
#
# Runs when a PR enters the merge queue.  Verifies that:
# 1. All approving reviewers have acknowledged all checklists
# 2. The evidence block in the PR description matches current acknowledgements
#
# If verification passes, the merge proceeds. If it fails, the PR is ejected
# from the queue.

name: Review Checklists Evidence

on:
  merge_group:

permissions:
  pull-requests: write
  statuses: write

jobs:
  review_checklists_evidence:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: review_checklists
          repository-cache: true

      # Extract the PR number from the merge group head ref.
      # The ref format is: refs/heads/gh-readonly-queue/<base>/pr-<number>-<sha>
      - name: Extract PR number from merge group
        id: pr-info
        shell: bash
        run: |
          HEAD_REF="${{ github.event.merge_group.head_ref }}"
          PR_NUM=$(echo "$HEAD_REF" | grep -oP 'pr-\K[0-9]+')
          if [ -z "$PR_NUM" ]; then
            echo "ERROR: Could not extract PR number from head_ref: $HEAD_REF"
            exit 1
          fi
          echo "pr-number=$PR_NUM" >> "$GITHUB_OUTPUT"
          echo "Extracted PR #$PR_NUM"

      - name: Verify evidence in PR description
        uses: ./actions/review-checklists
        with:
          action: evidence_strict
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ steps.pr-info.outputs.pr-number }}
          head-sha: ${{ github.event.merge_group.head_sha }}
