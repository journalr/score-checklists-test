# Merge-queue gate for review checklists.
#
# Runs when a PR enters the merge queue.  Atomically verifies that all
# checklist acknowledgements are in place and creates an evidence commit
# on the merge queue's temporary branch.  If verification fails the
# step exits non-zero and the PR is ejected from the queue.

name: Review Checklists Evidence

on:
  merge_group:

permissions:
  contents: write
  pull-requests: read
  statuses: write

jobs:
  review_checklists-evidence:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # Extract the PR number from the merge group head ref.
      # The ref format is: refs/heads/gh-readonly-queue/<base>/pr-<number>-<sha>
      - name: Extract PR number from merge group
        id: pr-info
        shell: bash
        run: |
          HEAD_REF="${{ github.event.merge_group.head_ref }}"
          PR_NUM=$(echo "$HEAD_REF" | grep -oP 'pr-\K[0-9]+')
          if [ -z "$PR_NUM" ]; then
            echo "ERROR: Could not extract PR number from head_ref: $HEAD_REF"
            exit 1
          fi
          echo "pr-number=$PR_NUM" >> "$GITHUB_OUTPUT"
          # Convert refs/heads/... to heads/... for the git ref API.
          BRANCH_REF="${HEAD_REF#refs/}"
          echo "branch=$BRANCH_REF" >> "$GITHUB_OUTPUT"
          echo "Extracted PR #$PR_NUM, branch ref: $BRANCH_REF"

      - name: Verify acknowledgements and create evidence commit
        uses: ./actions/review-checklists
        with:
          action: evidence_strict
          github-token: ${{ secrets.GITHUB_TOKEN }}
          pr-number: ${{ steps.pr-info.outputs.pr-number }}
          branch: ${{ steps.pr-info.outputs.branch }}
          head-sha: ${{ github.event.merge_group.head_sha }}
