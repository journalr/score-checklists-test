name: Test rebase_on_dependency Action

on:
  push:
    paths:
      - 'actions/rebase_on_dependency/**'
  pull_request:
    paths:
      - 'actions/rebase_on_dependency/**'

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - uses: bazel-contrib/setup-bazel@0.15.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true

      - name: Run tests
        run: |
          bazel test //actions/rebase_on_dependency/...


