# Workflow: Clang-Tidy PR check (blocking on changed files).
#
# Runs clang-tidy on every pull_request, push to main, and merge_group.
# - Fails if clang-tidy errors are found in C++ files changed by the PR.
# - The same changed-files scope is applied for both pull_request and
#   merge_group (gate) so that a passing PR check guarantees a passing gate.
# - Writes a job summary with error/warning counts and the first 20 error lines.
# - Uploads full findings + errors-only file as a downloadable artifact.
#
# Cache is saved only on pushes to main (not on PRs) to avoid
# cache poisoning from unreviewed code.

name: Clang-Tidy Check

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_call:
    outputs:
      artifact-name:
        description: "Name of the clang-tidy findings artifact"
        value: ${{ jobs.clang-tidy.outputs.artifact-name }}
      errors:
        description: "Total clang-tidy error count"
        value: ${{ jobs.clang-tidy.outputs.errors }}
      warnings:
        description: "Total clang-tidy warning count"
        value: ${{ jobs.clang-tidy.outputs.warnings }}
      conclusion:
        description: "Job conclusion: success or failure"
        value: ${{ jobs.clang-tidy.outputs.conclusion }}

permissions:
  contents: read
  actions: write # Needed to delete old bazel caches

concurrency:
  group: clang-tidy-pr-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

env:
  ANDROID_HOME: ""
  ANDROID_SDK_ROOT: ""
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  clang-tidy:
    runs-on: ubuntu-24.04
    outputs:
      artifact-name: clang-tidy-findings
      errors: ${{ steps.findings.outputs.errors }}
      warnings: ${{ steps.findings.outputs.warnings }}
      conclusion: ${{ steps.set-conclusion.outputs.conclusion }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Free Disk Space (Ubuntu)
        uses: eclipse-score/more-disk-space@v1
        with:
          level: 4

      # We explicitly retain setup-bazel since we use an optimized variant that improves caching
      - uses: castler/setup-bazel@cache-optimized
        with:
          bazelisk-cache: true
          disk-cache: "clang_tidy"
          repository-cache: true
          cache-optimized: true
          cache-save: ${{ github.ref == 'refs/heads/main' }}

      - uses: aspect-build/setup-aspect@b1e9d142e86f63c10d603304daa22bf80492e24c # v2026.25.1
        with:
          aspect-api-token: ${{ secrets.ASPECT_API_TOKEN }}

      - name: Allow linux-sandbox
        uses: ./actions/unblock_user_namespace_for_linux_sandbox

      - name: Run clang-tidy via Bazel
        id: run-clang-tidy
        run: |
          aspect lint --bazel-flag=--config=clang-tidy //...
