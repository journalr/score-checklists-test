# Workflow configuration for S-CORE CI - Bazel Build & Test communication module for target platforms
# This workflow gates merge queue entries and reusable callers for QNX builds.

name: Bazel Build & Test communication module (target-platforms)
on:
  merge_group:
    types: [checks_requested]
  workflow_call:
    secrets:
      SCORE_QNX_LICENSE:
        required: true
      SCORE_QNX_USER:
        required: true
      SCORE_QNX_PASSWORD:
        required: true

jobs:
  validate_qnx_secrets:
    name: validate_qnx_secrets
    runs-on: ubuntu-24.04
    steps:
      - name: Validate required QNX secrets
        env:
          SCORE_QNX_LICENSE: ${{ secrets.SCORE_QNX_LICENSE }}
          SCORE_QNX_USER: ${{ secrets.SCORE_QNX_USER }}
          SCORE_QNX_PASSWORD: ${{ secrets.SCORE_QNX_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()

          if [ -z "${SCORE_QNX_LICENSE}" ]; then
            missing+=("SCORE_QNX_LICENSE")
          fi

          if [ -z "${SCORE_QNX_USER}" ]; then
            missing+=("SCORE_QNX_USER")
          fi

          if [ -z "${SCORE_QNX_PASSWORD}" ]; then
            missing+=("SCORE_QNX_PASSWORD")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required QNX secrets: ${missing[*]}" >&2
            exit 1
          fi

  run_build_and_test_qnx:
    name: run_build_and_test_qnx
    needs: validate_qnx_secrets
    permissions:
      contents: read
      pull-requests: read
    uses: ./.github/workflows/build_and_test_qnx_reusable.yml
    secrets:
      SCORE_QNX_LICENSE: ${{ secrets.SCORE_QNX_LICENSE }}
      SCORE_QNX_USER: ${{ secrets.SCORE_QNX_USER }}
      SCORE_QNX_PASSWORD: ${{ secrets.SCORE_QNX_PASSWORD }}

  qnx_gate_status:
    name: qnx_gate_status
    needs:
      - validate_qnx_secrets
      - run_build_and_test_qnx
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    steps:
      - name: Report QNX gate status
        run: |
          set -euo pipefail

          echo "validate_qnx_secrets=${{ needs.validate_qnx_secrets.result }}"
          echo "run_build_and_test_qnx=${{ needs.run_build_and_test_qnx.result }}"

          if [ "${{ needs.validate_qnx_secrets.result }}" != "success" ]; then
            echo "QNX gate failed during secret validation." >&2
            exit 1
          fi

          if [ "${{ needs.run_build_and_test_qnx.result }}" != "success" ]; then
            echo "QNX gate failed during build and test execution." >&2
            exit 1
          fi
